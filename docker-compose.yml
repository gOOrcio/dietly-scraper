version: '3.8'

services:
  dietly-scraper:
    build: .
    volumes:
      - ./config/users.yaml:/app/config/users.yaml:ro
      - ./config/sites.yaml:/app/config/sites.yaml:ro
      - ./logs:/app/logs
    environment:
      - TZ=Europe/Warsaw  # Adjust timezone as needed
    restart: "no"  # Don't restart automatically
    
  # Cron scheduler container
  scheduler:
    image: alpine:3.21@sha256:c3f8e73fdb79deaebaa2037150150191b9dcbfba68b4a46d70103204c53f4709
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/logs
    environment:
      - TZ=Europe/Warsaw
    command: >
      sh -c "
        apk add --no-cache docker-cli dcron &&
        echo '0 8 * * * /bin/sh -c \"
          echo \"$(date): Starting Dietly sync...\" >> /logs/cron.log 2>&1 &&
          docker-compose -f /docker-compose.yml run --rm dietly-scraper >> /logs/sync.log 2>&1 ;
          EXIT_CODE=\$$? ;
          if [ \$$EXIT_CODE -eq 0 ]; then
            echo \"$(date): ✅ All users processed successfully\" >> /logs/cron.log 2>&1 ;
          elif [ \$$EXIT_CODE -eq 1 ]; then
            echo \"$(date): ⚠️ Partial success - some users failed\" >> /logs/cron.log 2>&1 ;
          else
            echo \"$(date): 💥 All users failed to sync\" >> /logs/cron.log 2>&1 ;
          fi ;
          echo \"$(date): Sync completed with exit code \$$EXIT_CODE\" >> /logs/cron.log 2>&1
        \"' | crontab - &&
        crond -f -l 2
      "
    restart: unless-stopped 