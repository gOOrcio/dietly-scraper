version: '3.8'

services:
  dietly-scraper:
    build: .
    volumes:
      - ./users.yaml:/app/users.yaml:ro
      - ./sites.yaml:/app/sites.yaml:ro
      - ./logs:/app/logs
    environment:
      - TZ=Europe/Warsaw  # Adjust timezone as needed
    restart: "no"  # Don't restart automatically
    
  # Cron scheduler container
  scheduler:
    image: alpine:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/logs
    environment:
      - TZ=Europe/Warsaw
    command: >
      sh -c "
        apk add --no-cache docker-cli dcron &&
        echo '0 8 * * * docker-compose -f /docker-compose.yml run --rm dietly-scraper >> /logs/cron.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    restart: unless-stopped 