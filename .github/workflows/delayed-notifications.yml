name: Delayed Failure Notifications

on:
  schedule:
    # Run every day at 9:00 AM UTC
    - cron: '0 9 * * *'

permissions:
  actions: read  # Required to read workflow runs and logs

jobs:
  check-previous-run:
    runs-on: ubuntu-latest
    steps:
    - name: Check previous workflow run
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const { data: runs } = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'daily-sync.yml',
            status: 'completed',
            per_page: 1
          });
          
          if (runs.total_count > 0) {
            const lastRun = runs.workflow_runs[0];
            const { data: logs } = await github.rest.actions.downloadWorkflowRunLogs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: lastRun.id
            });
            
            const logContent = Buffer.from(logs, 'base64').toString();
            
            if (logContent.includes('💥 All users failed to sync')) {
              console.log(`::error::Dietly Sync Completely Failed in previous run (${lastRun.id})`);
              console.log(`::error::All users failed to sync at ${lastRun.updated_at}`);
            } else if (logContent.includes('⚠️ Partial success - some users failed to sync')) {
              console.log(`::warning::Dietly Sync Partially Failed in previous run (${lastRun.id})`);
              console.log(`::warning::Some users failed to sync at ${lastRun.updated_at}`);
            }
            
            if (logContent.includes('💥') || logContent.includes('⚠️')) {
              console.log(`::error::Check run details: ${lastRun.html_url}`);
            }
          } 