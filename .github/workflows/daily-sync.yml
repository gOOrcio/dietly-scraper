name: Daily Dietly Sync

on:
  schedule:
    # Run every day at 5:00 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-meals:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.sync.outputs.status }}
      run_id: ${{ github.run_id }}
      summary: ${{ steps.summary.outputs.summary }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v2
    
    - name: Install dependencies
      run: uv sync
    
    - name: Create config files from secrets
      run: |
        mkdir -p config
        echo '${{ secrets.USERS_YAML }}' > config/users.yaml
        echo '${{ secrets.SITES_YAML }}' > config/sites.yaml
    
    - name: Run dietly to fitatu sync
      id: sync
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 15
        max_attempts: 3
        retry_wait_seconds: 60
        warning_on_retry: true
        command: |
          set +e  # Don't exit on non-zero exit codes
          uv run python main.py > sync.log
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Set job status based on exit code
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ All users processed successfully"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "⚠️ Partial success - some users failed to sync"
            echo "status=warning" >> $GITHUB_OUTPUT
          else
            echo "💥 All users failed to sync"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1  # Only fail for complete failure to trigger retry
          fi
          
          exit $EXIT_CODE
    
    - name: Generate Summary
      id: summary
      if: always()
      run: |
        # Extract JSON logs and create summary
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "## Dietly Sync Summary" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        
        # Get the final summary log entry
        SUMMARY=$(grep -o '{.*"message":"Sync summary".*}' sync.log | tail -n 1)
        if [ ! -z "$SUMMARY" ]; then
          # Extract and format statistics
          TOTAL_USERS=$(echo $SUMMARY | jq -r '.total_users')
          SUCCESSFUL=$(echo $SUMMARY | jq -r '.successful_syncs')
          NO_PLAN=$(echo $SUMMARY | jq -r '.no_active_plan')
          NO_MENU=$(echo $SUMMARY | jq -r '.no_menu')
          FAILED=$(echo $SUMMARY | jq -r '.failed')
          DURATION=$(echo $SUMMARY | jq -r '.total_duration_ms')
          
          echo "### Statistics" >> $GITHUB_OUTPUT
          echo "- Total Users: $TOTAL_USERS" >> $GITHUB_OUTPUT
          echo "- Successful Syncs: $SUCCESSFUL" >> $GITHUB_OUTPUT
          echo "- No Active Plan: $NO_PLAN" >> $GITHUB_OUTPUT
          echo "- No Menu: $NO_MENU" >> $GITHUB_OUTPUT
          echo "- Failed: $FAILED" >> $GITHUB_OUTPUT
          echo "- Total Duration: ${DURATION}ms" >> $GITHUB_OUTPUT
          
          # Error categories
          echo "" >> $GITHUB_OUTPUT
          echo "### Error Categories" >> $GITHUB_OUTPUT
          echo $SUMMARY | jq -r '.error_categories | to_entries[] | "- \(.key): \(.value)"' >> $GITHUB_OUTPUT
          
          # Failed users
          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_OUTPUT
            echo "### Failed Users" >> $GITHUB_OUTPUT
            grep -o '{.*"status":"failed".*}' sync.log | jq -r '"* \(.user): \(.message) (\(.error_category))"' >> $GITHUB_OUTPUT
          fi
        else
          echo "⚠️ No summary data available" >> $GITHUB_OUTPUT
        fi
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Add Job Summary
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '${{ steps.summary.outputs.summary }}'
          });
    
    - name: Handle partial success
      if: steps.sync.outputs.exit_code == '1'
      run: |
        echo "::warning::Some users failed to sync. Check logs for details."
        exit 0  # Don't fail the job for partial success
    
    - name: Handle success
      if: steps.sync.outputs.exit_code == '0'
      run: |
        echo "✅ All users processed successfully"
        
  notify-failures:
    needs: sync-meals
    runs-on: ubuntu-latest
    if: always() && (needs.sync-meals.result == 'failure' || needs.sync-meals.outputs.status == 'failure')
    
    steps:
    - name: Check workflow status
      run: |
        echo "::error::Dietly Sync Failed - Check logs for details"
        echo "::error::Job failed at $(date) - Manual intervention may be required"
        echo "::error::Original run ID: ${{ needs.sync-meals.outputs.run_id }}"
