name: Daily Dietly Sync

on:
  schedule:
    # Run every day at 5:00 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-meals:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v2
    
    - name: Install dependencies
      run: uv sync
    
    - name: Install Playwright browsers
      run: |
        uv run playwright install chromium
        uv run playwright install-deps
    
    - name: Create config files from secrets
      run: |
        echo '${{ secrets.USERS_YAML }}' > users.yaml
        echo '${{ secrets.SITES_YAML }}' > sites.yaml
    
    - name: Run dietly scraper
      run: uv run python main.py 