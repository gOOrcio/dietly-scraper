name: SonarQube Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Security audit
        run: uv run --with pip-audit pip-audit

      - name: Compute SonarQube branch args
        id: sonar_args
        run: |
          if [[ "$EVENT" == "pull_request" ]]; then
            echo "args=-Dsonar.pullrequest.key=${PR_NUMBER} -Dsonar.pullrequest.branch=${PR_BRANCH} -Dsonar.pullrequest.base=${PR_BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "args=-Dsonar.branch.name=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
          REF_NAME: ${{ github.ref_name }}

      - uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        continue-on-error: true
        with:
          args: >
            -Dsonar.projectKey=dietly-scraper
            -Dsonar.host.url=https://sonarqube.mati-lab.online
            ${{ steps.sonar_args.outputs.args }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
