name: SonarQube Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarqube:
    uses: gOOrcio/sonarqube-sandbox/.github/workflows/reusable-sonar-python.yml@main
    with:
      project_key: dietly-scraper
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
